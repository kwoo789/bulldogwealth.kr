<header class="site-header">
  <div class="header-inner container">

    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="logo-icon">🐶</span>
      <span class="logo-text">Bulldog<strong>Wealth</strong></span>
    </a>

    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">홈</a>
      <a href="{{ '/categories/주식' | relative_url }}" class="nav-link">주식</a>
      <a href="{{ '/categories/ETF' | relative_url }}" class="nav-link">ETF</a>
      <a href="{{ '/categories/부동산' | relative_url }}" class="nav-link">부동산</a>
      <a href="{{ '/categories/재테크' | relative_url }}" class="nav-link">재테크</a>
    </nav>

    <div class="header-right">
      <button class="search-toggle" id="searchToggle" aria-label="검색">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <button class="mobile-menu-toggle" id="mobileMenuToggle">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>

  <!-- Search Bar -->
  <div class="search-bar" id="searchBar">
    <div class="container">
      <input type="text" id="searchInput" class="search-input" placeholder="검색어를 입력하세요...">
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>

  <!-- Mobile Nav -->
  <div class="mobile-nav" id="mobileNav">
    <a href="{{ '/' | relative_url }}" class="mobile-nav-link">홈</a>
    <a href="{{ '/categories/주식' | relative_url }}" class="mobile-nav-link">주식</a>
    <a href="{{ '/categories/ETF' | relative_url }}" class="mobile-nav-link">ETF</a>
    <a href="{{ '/categories/부동산' | relative_url }}" class="mobile-nav-link">부동산</a>
    <a href="{{ '/categories/재테크' | relative_url }}" class="mobile-nav-link">재테크</a>
  </div>

</header>
