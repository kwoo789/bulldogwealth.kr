title: "Bulldog Wealth"
tagline: "한국인을 위한 경제·주식·투자 정보"
description: "주식, ETF, 부동산, 재테크 정보를 쉽게 알려드립니다"
url: "https://bulldogwealth.kr"
baseurl: ""

# 애드센스 설정 (나중에 승인 후 입력)
google_adsense: ""        # ca-pub-XXXXXXXXXX
ad_slot_top: ""           # 본문 상단 광고 슬롯
ad_slot_bottom: ""        # 본문 하단 광고 슬롯
ad_slot_sidebar: ""       # 사이드바 광고 슬롯

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# 페이지네이션
paginate: 9
paginate_path: "/page:num/"

# 퍼머링크
permalink: /:categories/:year/:month/:day/:title/

# 기본값
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Bulldog Wealth"

# 언어
lang: ko-KR
timezone: Asia/Seoul

# 제외 파일
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
