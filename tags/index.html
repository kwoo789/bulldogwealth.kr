---
layout: default
title: "태그"
permalink: /tags/
---

<main class="home-layout">
  <div class="container">

    <div class="tag-page-header" id="tagPageHeader">
      <h1 class="tag-page-title" id="tagPageTitle">🏷️ 태그 목록</h1>
      <p class="tag-page-count" id="tagPageCount"></p>
    </div>

    <!-- 태그 전체 목록 (태그 미선택 시) -->
    <div id="tagListView">
      <div class="tags-cloud tags-cloud-large" id="allTagsCloud"></div>
    </div>

    <!-- 태그별 포스트 목록 (태그 선택 시) -->
    <div id="tagPostView" style="display:none;">
      <div class="tag-post-list" id="tagPostList"></div>
      <div style="margin-top:2rem;">
        <a href="#" class="back-btn" id="backToTags">← 태그 목록으로</a>
      </div>
    </div>

  </div>
</main>

<script>
(function () {
  var searchData = [];

  // URL에서 태그 파라미터 읽기 (?tag=비트코인)
  function getTagFromURL() {
    var params = new URLSearchParams(window.location.search);
    return params.get('tag') ? decodeURIComponent(params.get('tag')) : null;
  }

  // 태그명 정리 (쉼표·공백 제거)
  function cleanTag(t) {
    return t.replace(/,/g, '').trim();
  }

  // 전체 태그 목록 렌더링
  function renderAllTags() {
    var tagMap = {};
    searchData.forEach(function (post) {
      if (!post.tags) return;
      post.tags.forEach(function (raw) {
        var tag = cleanTag(raw);
        if (!tag) return;
        tagMap[tag] = (tagMap[tag] || 0) + 1;
      });
    });

    var sorted = Object.keys(tagMap).sort();
    var cloud = document.getElementById('allTagsCloud');
    if (!cloud) return;

    cloud.innerHTML = sorted.map(function (tag) {
      var count = tagMap[tag];
      return '<a href="/tags/?tag=' + encodeURIComponent(tag) + '" class="tag-cloud-item tag-cloud-large-item">'
        + tag
        + ' <span class="tag-count">' + count + '</span>'
        + '</a>';
    }).join('');

    document.getElementById('tagPageTitle').textContent = '🏷️ 태그 목록';
    document.getElementById('tagPageCount').textContent = '총 ' + sorted.length + '개 태그';
    document.getElementById('tagListView').style.display = 'block';
    document.getElementById('tagPostView').style.display = 'none';
  }

  // 특정 태그의 포스트 목록 렌더링
  function renderTagPosts(tag) {
    var posts = searchData.filter(function (post) {
      if (!post.tags) return false;
      return post.tags.some(function (raw) {
        return cleanTag(raw) === tag;
      });
    });

    document.getElementById('tagPageTitle').textContent = '🏷️ #' + tag;
    document.getElementById('tagPageCount').textContent = posts.length + '개의 글';
    document.getElementById('tagListView').style.display = 'none';
    document.getElementById('tagPostView').style.display = 'block';

    var list = document.getElementById('tagPostList');
    if (posts.length === 0) {
      list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">해당 태그의 글이 없습니다.</p>';
      return;
    }

    list.innerHTML = posts.map(function (post) {
      return '<article class="tag-post-item">'
        + '<a href="' + post.url + '" class="tag-post-link">'
        + '<div class="tag-post-meta">'
        + '<span class="tag-post-category">' + (post.category || '') + '</span>'
        + '<span class="tag-post-date">' + (post.date || '') + '</span>'
        + '</div>'
        + '<h2 class="tag-post-title">' + post.title + '</h2>'
        + '<p class="tag-post-excerpt">' + (post.content || '') + '</p>'
        + '</a>'
        + '</article>';
    }).join('');
  }

  // 뒤로가기 버튼
  var backBtn = document.getElementById('backToTags');
  if (backBtn) {
    backBtn.addEventListener('click', function (e) {
      e.preventDefault();
      history.pushState(null, '', '/tags/');
      renderAllTags();
    });
  }

  // popstate (브라우저 뒤로/앞으로)
  window.addEventListener('popstate', function () {
    var tag = getTagFromURL();
    if (tag) renderTagPosts(tag);
    else renderAllTags();
  });

  // search.json 로드 후 렌더링
  var basePath = (window.location.pathname.match(/^(\/[^/]+)/) || [''])[0];
  var searchUrl = (basePath && basePath !== '/tags') ? basePath + '/search.json' : '/search.json';

  fetch('/search.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      searchData = data;
      var tag = getTagFromURL();
      if (tag) renderTagPosts(tag);
      else renderAllTags();
    })
    .catch(function () {
      document.getElementById('tagPageCount').textContent = '데이터를 불러오지 못했습니다.';
    });

})();
</script>
